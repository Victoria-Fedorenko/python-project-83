{% extends "base.html" %}

{% block title %}Главная | Page Analyzer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <h1 class="display-4 mb-4">Анализатор страниц</h1>
        <p class="lead">Бесплатно проверяйте сайты на SEO-пригодность</p>
        
        <!-- Ваша форма -->
        <form method="POST" class="mt-4">
            <div class="input-group mb-3">
                <input type="url" name="url" class="form-control" 
                       value="{{ url.name|default('', true) }}">
                <button class="btn btn-primary btn-lg" type="submit">Проверить</button>
            </div>
            {% if errors and errors.name %}
            <div class="alert alert-danger">{{ errors.name }}</div>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
