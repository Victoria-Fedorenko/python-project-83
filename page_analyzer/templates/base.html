<!doctype html>
<html lang="ru">
    <head>
        {% block head %}
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        {% block styles %}
            <!-- Хелпер для CSS Bootstrap 5 -->
            {{ bootstrap.load_css() }}
        {% endblock %}

        <title>{% block title %}Page Analyzer{% endblock %}</title>
        {% endblock %}
    </head>
    <body>
        {% block navbar %}
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('index') }}">Page Analyzer</a>
            </div>
        </nav>
        {% endblock %}

        <main class="container mt-4">
            {% block content %}{% endblock %}
        </main>

        {% block scripts %}
            <!-- Хелпер для JavaScript Bootstrap 5 -->
            {{ bootstrap.load_js() }}
        {% endblock %}
    </body>
</html>
