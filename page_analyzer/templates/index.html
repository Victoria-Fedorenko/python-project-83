{% extends "base.html" %}

{% block title %}Главная | Page Analyzer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <h1 class="display-4 mb-4">Анализатор страниц</h1>
        <p class="lead">Проверьте SEO-параметры любой веб-страницы</p>
        
        <!-- Ваша форма или другой контент -->
        <form method="POST" action="/analyze" class="mt-4">
            <div class="input-group mb-3">
                <input type="url" name="url" class="form-control form-control-lg" placeholder="https://example.com" required>
                <button class="btn btn-primary btn-lg" type="submit">Проверить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
